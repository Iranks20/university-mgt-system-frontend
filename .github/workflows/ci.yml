name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  VITE_API_BASE_URL: /api/v1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          if [ ! -s package-lock.json ]; then
            echo "::error::package-lock.json is missing or empty. Run npm install and commit package-lock.json"
            exit 1
          fi
          npm ci --include=optional

      - name: Ensure native optional deps (rollup + lightningcss + tailwind oxide)
        shell: bash
        run: |
          set -euo pipefail

          # Resolve versions from package-lock.json without requiring package.json subpaths (exports-safe).
          ROLLUP_VER="$(node -e "const lock=require('./package-lock.json');process.stdout.write(lock.packages['node_modules/rollup'].version)")"
          LIGHTNING_VER="$(node -e "const lock=require('./package-lock.json');process.stdout.write(lock.packages['node_modules/lightningcss'].version)")"
          OXIDE_VER="$(node -e "const lock=require('./package-lock.json');process.stdout.write(lock.packages['node_modules/@tailwindcss/oxide'].version)")"

          # Compute platform suffixes.
          LIBC="$(node -e "const {execSync}=require('child_process');try{const o=execSync('ldd --version',{encoding:'utf8'});process.stdout.write(/musl/i.test(o)?'musl':'gnu')}catch{process.stdout.write('gnu')}")"
          ARCH="$(node -e "process.stdout.write(process.arch)")"

          # GitHub runners for this workflow are ubuntu-latest, so linux + gnu is expected.
          # But we still derive suffixes so this step is portable to other Linux runners.
          ROLLUP_PKG=\"@rollup/rollup-linux-${ARCH}-${LIBC}\"
          LIGHTNING_PKG=\"lightningcss-linux-${ARCH}-${LIBC}\"
          OXIDE_PKG=\"@tailwindcss/oxide-linux-${ARCH}-${LIBC}\"

          npm i --no-save --ignore-scripts --no-audit --loglevel=error \
            \"${ROLLUP_PKG}@${ROLLUP_VER}\" \
            \"${LIGHTNING_PKG}@${LIGHTNING_VER}\" \
            \"${OXIDE_PKG}@${OXIDE_VER}\"

      - name: Typecheck and production build
        run: npm run build

      - name: Unit tests
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "$HOME/university-mgt-system-frontend"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            CI=true npm ci --include=optional
            ROLLUP_VER="$(node -e "const lock=require('./package-lock.json');process.stdout.write(lock.packages['node_modules/rollup'].version)")"
            LIGHTNING_VER="$(node -e "const lock=require('./package-lock.json');process.stdout.write(lock.packages['node_modules/lightningcss'].version)")"
            OXIDE_VER="$(node -e "const lock=require('./package-lock.json');process.stdout.write(lock.packages['node_modules/@tailwindcss/oxide'].version)")"
            LIBC="$(node -e "const {execSync}=require('child_process');try{const o=execSync('ldd --version',{encoding:'utf8'});process.stdout.write(/musl/i.test(o)?'musl':'gnu')}catch{process.stdout.write('gnu')}")"
            ARCH="$(node -e "process.stdout.write(process.arch)")"
            ROLLUP_PKG="@rollup/rollup-linux-${ARCH}-${LIBC}"
            LIGHTNING_PKG="lightningcss-linux-${ARCH}-${LIBC}"
            OXIDE_PKG="@tailwindcss/oxide-linux-${ARCH}-${LIBC}"
            npm i --no-save --ignore-scripts --no-audit --loglevel=error \
              "${ROLLUP_PKG}@${ROLLUP_VER}" \
              "${LIGHTNING_PKG}@${LIGHTNING_VER}" \
              "${OXIDE_PKG}@${OXIDE_VER}"
            npm run build
            rsync -a --delete dist/ /var/www/kcu-mgt-frontend/
