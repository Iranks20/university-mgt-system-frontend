name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  VITE_API_BASE_URL: /api/v1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          if [ ! -s package-lock.json ]; then
            echo "::error::package-lock.json is missing or empty. Run npm install and commit package-lock.json"
            exit 1
          fi
          npm ci --include=optional

      - name: Ensure native optional deps (rollup + lightningcss)
        run: |
          set -euo pipefail
          ROLLUP_VER="$(node -e "const fs=require('fs');const path=require('path');const p=path.join(path.dirname(require.resolve('rollup')),'..','package.json');process.stdout.write(JSON.parse(fs.readFileSync(p,'utf8')).version)")"
          LIGHTNING_VER="$(node -e "const fs=require('fs');const path=require('path');const p=path.join(path.dirname(require.resolve('lightningcss')),'..','package.json');process.stdout.write(JSON.parse(fs.readFileSync(p,'utf8')).version)")"
          npm i --no-save --no-audit --loglevel=error "@rollup/rollup-linux-x64-gnu@${ROLLUP_VER}" "lightningcss-linux-x64-gnu@${LIGHTNING_VER}"

      - name: Typecheck and production build
        run: npm run build

      - name: Unit tests
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "$HOME/university-mgt-system-frontend"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull --ff-only origin "${{ github.ref_name }}"
            CI=true npm ci --include=optional
            ROLLUP_VER="$(node -e "const fs=require('fs');const path=require('path');const p=path.join(path.dirname(require.resolve('rollup')),'..','package.json');process.stdout.write(JSON.parse(fs.readFileSync(p,'utf8')).version)")"
            LIGHTNING_VER="$(node -e "const fs=require('fs');const path=require('path');const p=path.join(path.dirname(require.resolve('lightningcss')),'..','package.json');process.stdout.write(JSON.parse(fs.readFileSync(p,'utf8')).version)")"
            npm i --no-save --no-audit --loglevel=error "@rollup/rollup-linux-x64-gnu@${ROLLUP_VER}" "lightningcss-linux-x64-gnu@${LIGHTNING_VER}"
            npm run build
            rsync -a --delete dist/ /var/www/kcu-mgt-frontend/
